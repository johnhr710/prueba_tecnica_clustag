services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tasks
      POSTGRES_USER: tasks
      POSTGRES_PASSWORD: tasks
    volumes:
      - db_data:/var/lib/postgresql/data
    networks: [appnet]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tasks -d tasks"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build: ./backend
    environment:
      DB_URL: jdbc:postgresql://db:5432/tasks
      DB_USER: tasks
      DB_PASSWORD: tasks
    depends_on:
      db:
        condition: service_healthy
    networks: [appnet]

  frontend:
    build: ./frontend
    ports:
      - "8081:80"
    depends_on:
      - backend
    networks: [appnet]

networks:
  appnet:

volumes:
  db_data: